server {
    listen 443 ssl;
    server_name metalks.me www.metalks.me;

    # ===============================================
    # 根目录指向前端目录
    # ===============================================
    root /opt/metalks/frontend;
    index index.html;

    # SSL配置
    ssl_certificate /etc/letsencrypt/live/metalks.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/metalks.me/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ===============================================
    # 管理后台
    # ===============================================

    location /admin {
        proxy_pass http://127.0.0.1:8000;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
    }

    location /admin/statics/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===============================================
    # API 代理（含 SSE 流式支持）
    # ===============================================

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
        # SSE 必须关闭的头
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }

    # ===============================================
    # 静态资源（如果将来用 Vite 构建，hash 文件强缓存）
    # ===============================================

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin *;
    }

    # JS 文件
    location /js/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # 字体文件
    location /fonts/ {
        alias /opt/metalks/frontend/fonts/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 图片文件
    location /images/ {
        alias /opt/metalks/frontend/images/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ===============================================
    # 🎯 SPA 客户端路由 fallback
    # 所有未匹配到静态文件的请求 → index.html
    # Vue Router 在浏览器端接管路由
    # ===============================================

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ===============================================
    # 安全设置
    # ===============================================

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# HTTP 自动跳转 HTTPS
server {
    listen 80;
    server_name metalks.me www.metalks.me;
    return 301 https://$host$request_uri;
}
